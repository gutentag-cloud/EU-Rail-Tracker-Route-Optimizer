<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <title>🚆 EU Rail Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --primary:#1a73e8; --danger:#d32f2f; --success:#2ecc71;
      --warning:#f39c12; --bg:rgba(255,255,255,0.97);
      --card:#f5f7fa; --text:#333; --muted:#888; --r:10px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
    #map{width:100%;height:100vh}

    /* sidebar */
    #sidebar{
      position:absolute;top:10px;left:10px;z-index:1000;
      width:380px;max-height:calc(100vh - 20px);
      background:var(--bg);border-radius:14px;
      box-shadow:0 4px 30px rgba(0,0,0,0.12);
      overflow-y:auto;padding:20px;
    }
    @media(max-width:500px){
      #sidebar{width:calc(100vw - 20px);max-height:50vh;
        top:auto;bottom:10px;left:10px;right:10px}
    }
    h1{font-size:1.3em;margin-bottom:4px}
    .sub{font-size:0.78em;color:var(--muted);margin-bottom:14px}

    .tabs{display:flex;gap:3px;margin-bottom:14px;flex-wrap:wrap}
    .tab{
      flex:1;min-width:55px;padding:7px 4px;border:none;border-radius:8px;
      cursor:pointer;font-weight:600;font-size:0.78em;
      background:#e8e8e8;transition:all .2s;white-space:nowrap;
    }
    .tab.active{background:var(--primary);color:#fff}
    .panel{display:none}.panel.active{display:block}

    label{font-size:0.82em;font-weight:600;color:#555;
      display:block;margin-bottom:4px;margin-top:10px}
    input,select{
      width:100%;padding:9px 12px;border:1.5px solid #ddd;
      border-radius:8px;font-size:0.92em;outline:none;
    }
    input:focus{border-color:var(--primary)}
    .row{display:flex;gap:8px}.row>*{flex:1}
    button.primary{
      width:100%;padding:11px;border:none;border-radius:8px;
      background:var(--primary);color:#fff;font-weight:700;
      font-size:0.95em;cursor:pointer;margin-top:14px;
    }
    button.primary:hover{background:#1557b0}

    .results{margin-top:14px}
    .result-card{
      padding:10px 12px;background:var(--card);border-radius:8px;
      margin-bottom:6px;font-size:0.88em;cursor:pointer;
      border-left:4px solid var(--primary);transition:background .2s;
    }
    .result-card:hover{background:#e3ecfa}
    .result-card .name{font-weight:700}
    .result-card .meta{color:var(--muted);font-size:0.82em}

    .route-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:12px}
    .stat{text-align:center;background:#e3ecfa;padding:8px;border-radius:8px}
    .stat .val{font-size:1.2em;font-weight:800;color:var(--primary)}
    .stat .lbl{font-size:0.72em;color:#666}

    .badge{display:inline-block;padding:2px 8px;border-radius:12px;
      font-size:0.78em;font-weight:700;margin-right:4px;color:#fff}

    .live-info{
      background:#e8f8e8;border-radius:8px;padding:10px;
      font-size:0.85em;color:var(--success);margin-bottom:10px;
      text-align:center;font-weight:600;
    }

    /* autocomplete */
    .ac-wrap{position:relative}
    .ac-drop{
      position:absolute;top:100%;left:0;right:0;z-index:2000;
      background:#fff;border:1px solid #ddd;border-radius:0 0 8px 8px;
      max-height:260px;overflow-y:auto;
      box-shadow:0 4px 16px rgba(0,0,0,0.15);
    }
    .ac-drop:empty{display:none}
    .ac-item{
      padding:10px 12px;cursor:pointer;
      border-bottom:1px solid #f0f0f0;
      display:flex;justify-content:space-between;align-items:center;
    }
    .ac-item:hover{background:#e3ecfa}
    .ac-item:last-child{border-bottom:none;border-radius:0 0 8px 8px}
    .ac-name{font-weight:600;font-size:0.9em}
    .ac-meta{font-size:0.78em;color:var(--muted)}

    .op-row{display:flex;gap:4px;margin-top:8px}
    .op-btn{
      flex:1;padding:6px;border:2px solid #ddd;border-radius:8px;
      background:#fff;cursor:pointer;font-weight:600;
      font-size:0.78em;text-align:center;transition:all .2s;
    }
    .op-btn.active{border-color:var(--primary);background:#e3ecfa}
    .op-btn .op-status{font-size:0.7em;display:block;margin-top:2px}

    .toggle-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:0.85em}
    .toggle-row input[type=checkbox]{width:auto}

    #status{margin-top:10px;padding:8px;border-radius:6px;font-size:0.82em;display:none}
    #status.info{display:block;background:#e3ecfa;color:var(--primary)}
    #status.error{display:block;background:#fde8e8;color:var(--danger)}
    #status.success{display:block;background:#e8f8e8;color:var(--success)}

    .pareto-card{
      padding:10px 12px;background:var(--card);border-radius:8px;
      margin-bottom:6px;font-size:0.85em;cursor:pointer;
      border-left:4px solid var(--warning);
    }
    .pareto-card:hover{background:#fef5e3}
    .pareto-objs{display:flex;gap:12px;margin-top:4px}
    .pareto-obj{font-size:0.8em;color:var(--muted)}
    .pareto-obj b{color:var(--text)}
  </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <h1>🚆 EU Rail Tracker</h1>
  <div class="sub">Live trains · Route optimizer · Delay heatmap</div>

  <label>Operator <span style="font-weight:400;color:var(--muted)">(for search & departures)</span></label>
  <div class="op-row">
    <div class="op-btn active" onclick="setOp('db',this)">🇩🇪 DB<span class="op-status" style="color:var(--success)">✅ stable</span></div>
    <div class="op-btn" onclick="setOp('sbb',this)">🇨🇭 SBB<span class="op-status" style="color:var(--success)">✅ stable</span></div>
    <div class="op-btn" onclick="setOp('oebb',this)">🇦🇹 ÖBB<span class="op-status" style="color:var(--warning)">⚠️ beta</span></div>
    <div class="op-btn" onclick="setOp('sncf',this)">🇫🇷 SNCF<span class="op-status" style="color:var(--warning)">⚠️ beta</span></div>
  </div>

  <div class="tabs" style="margin-top:14px">
    <button class="tab active" onclick="switchTab('live')">🔴 Live Map</button>
    <button class="tab" onclick="switchTab('route')">🗺️ Route</button>
    <button class="tab" onclick="switchTab('pareto')">⚖️ Pareto</button>
    <button class="tab" onclick="switchTab('delays')">📊 Delays</button>
    <button class="tab" onclick="switchTab('search')">🔍 Explore</button>
  </div>

  <!-- ══ LIVE MAP ══ -->
  <div id="panel-live" class="panel active">
    <div class="live-info" id="live-info">Zoom into a region to see live trains</div>
    <div class="toggle-row">
      <input type="checkbox" id="auto-refresh" checked />
      <label for="auto-refresh" style="margin:0">Auto-refresh every 60s</label>
    </div>
    <button class="primary" onclick="fetchRadar()" style="margin-top:10px">🔄 Refresh Now</button>
    <div id="live-results" class="results"></div>
  </div>

  <!-- ══ ROUTE ══ -->
  <div id="panel-route" class="panel">
    <label>From</label>
    <div class="ac-wrap">
      <input id="route-from" placeholder="Type a station name..." autocomplete="off" />
      <div class="ac-drop" id="route-from-drop"></div>
    </div>
    <label>To</label>
    <div class="ac-wrap">
      <input id="route-to" placeholder="Type a station name..." autocomplete="off" />
      <div class="ac-drop" id="route-to-drop"></div>
    </div>
    <div class="row">
      <div><label>Algorithm</label>
        <select id="r-algo"><option value="astar">A*</option><option value="dijkstra">Dijkstra</option></select></div>
      <div><label>Optimize</label>
        <select id="r-weight"><option value="duration">⏱ Duration</option><option value="distance">📏 Distance</option></select></div>
    </div>
    <button class="primary" onclick="findRoute()">Find Optimal Route</button>
    <div id="route-results" class="results"></div>
  </div>

  <!-- ══ PARETO ══ -->
  <div id="panel-pareto" class="panel">
    <label>From</label>
    <div class="ac-wrap">
      <input id="pareto-from" placeholder="Type a station name..." autocomplete="off" />
      <div class="ac-drop" id="pareto-from-drop"></div>
    </div>
    <label>To</label>
    <div class="ac-wrap">
      <input id="pareto-to" placeholder="Type a station name..." autocomplete="off" />
      <div class="ac-drop" id="pareto-to-drop"></div>
    </div>
    <button class="primary" onclick="findPareto()">Find Pareto Routes</button>
    <div id="pareto-results" class="results"></div>
  </div>

  <!-- ══ DELAYS ══ -->
  <div id="panel-delays" class="panel">
    <label>Country (optional)</label>
    <input id="delay-country" placeholder="DE, AT, CH, FR..." />
    <button class="primary" onclick="loadHeatmap()">Load Delay Heatmap</button>
    <p style="font-size:0.78em;color:var(--muted);margin-top:8px">
      💡 View station departures first to collect delay data.</p>
    <div id="delay-results" class="results"></div>
  </div>

  <!-- ══ EXPLORE ══ -->
  <div id="panel-search" class="panel">
    <label>Search stations</label>
    <div class="ac-wrap">
      <input id="search-input" placeholder="Berlin, Milano, Wien..." autocomplete="off" />
      <div class="ac-drop" id="search-input-drop"></div>
    </div>
    <div id="search-results" class="results"></div>
  </div>

  <div id="status"></div>
</div>

<script>
// ══════════════════════════════════════
//  GLOBALS
// ══════════════════════════════════════
const API = location.origin + '/api';
let OP = 'db';
let currentTab = 'live';
let radarTimer = null;

// ══════════════════════════════════════
//  MAP
// ══════════════════════════════════════
const map = L.map('map').setView([48.5, 9.0], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OSM © CARTO', maxZoom:18
}).addTo(map);

const trainIcon = sz => L.divIcon({html:`<div style="font-size:${sz}px">🚆</div>`,
  iconSize:[sz+4,sz+4],iconAnchor:[(sz+4)/2,(sz+4)/2],className:''});
const stIcon = L.divIcon({html:'<div style="font-size:14px">📍</div>',
  iconSize:[18,18],iconAnchor:[9,9],className:''});

const layers = {
  trains:  L.layerGroup().addTo(map),
  route:   L.layerGroup().addTo(map),
  station: L.layerGroup().addTo(map),
  heat:    L.layerGroup().addTo(map),
};

// ══════════════════════════════════════
//  AUTOCOMPLETE
// ══════════════════════════════════════
function setupAC(inputId, dropId, onSelect) {
  const inp = document.getElementById(inputId);
  const drop = document.getElementById(dropId);
  let timer;

  inp.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(async () => {
      const q = inp.value.trim();
      if (q.length < 2) { drop.innerHTML = ''; return; }
      try {
        const res = await fetch(`${API}/stations/search?q=${enc(q)}&limit=8&operator=${OP}`);
        const list = await res.json();
        drop.innerHTML = '';
        if (!list.length) {
          drop.innerHTML = '<div class="ac-item"><span class="ac-name" style="color:var(--muted)">No stations found</span></div>';
          return;
        }
        list.forEach(s => {
          const el = document.createElement('div');
          el.className = 'ac-item';
          const flag = {DE:'🇩🇪',AT:'🇦🇹',CH:'🇨🇭',FR:'🇫🇷',IT:'🇮🇹',NL:'🇳🇱',BE:'🇧🇪',ES:'🇪🇸',CZ:'🇨🇿',PL:'🇵🇱',GB:'🇬🇧',SE:'🇸🇪',DK:'🇩🇰',HU:'🇭🇺',HR:'🇭🇷',SI:'🇸🇮',SK:'🇸🇰',RO:'🇷🇴',LU:'🇱🇺',PT:'🇵🇹'}[s.country] || '🏳️';
          el.innerHTML = `<span class="ac-name">${flag} ${s.name}</span><span class="ac-meta">${s.country || ''}</span>`;
          el.onclick = () => {
            inp.value = s.name;
            inp.dataset.sid = s.id;
            inp.dataset.dbid = s.db_id || s.id;
            inp.dataset.lat = s.coords.latitude;
            inp.dataset.lon = s.coords.longitude;
            drop.innerHTML = '';
            if (onSelect) onSelect(s);
          };
          drop.appendChild(el);
        });
      } catch(e) { console.warn('AC error:', e); }
    }, 300);
  });

  document.addEventListener('click', e => {
    if (!inp.contains(e.target) && !drop.contains(e.target)) drop.innerHTML = '';
  });
}

// Set up all autocomplete fields
setupAC('route-from', 'route-from-drop', s => {
  map.setView([s.coords.latitude, s.coords.longitude], 8);
});
setupAC('route-to', 'route-to-drop');
setupAC('pareto-from', 'pareto-from-drop');
setupAC('pareto-to', 'pareto-to-drop');
setupAC('search-input', 'search-input-drop', s => {
  layers.station.clearLayers();
  L.marker([s.coords.latitude, s.coords.longitude], {icon: stIcon})
    .bindPopup(`<b>${s.name}</b><br>ID: ${s.id}<br>Country: ${s.country}`)
    .addTo(layers.station);
  map.setView([s.coords.latitude, s.coords.longitude], 10);

  // Show departures for explored station
  loadStationDepartures(s.db_id || s.id, s.name);
});

async function loadStationDepartures(stopId, name) {
  try {
    const res = await fetch(`${API}/departures/${stopId}?operator=${OP}&duration=60`);
    if (!res.ok) return;
    const deps = await res.json();
    const c = document.getElementById('search-results');
    c.innerHTML = `<p style="font-size:0.85em;font-weight:600;margin-bottom:8px">${name} — next departures:</p>`;
    if (!deps.length) { c.innerHTML += '<p style="color:var(--muted)">No departures found</p>'; return; }
    deps.slice(0, 15).forEach(d => {
      const delay = d.delay_seconds;
      let badge = '';
      if (delay != null) {
        const m = Math.round(delay / 60);
        if (m <= 0) badge = '<span class="badge" style="background:var(--success)">on time</span>';
        else if (m <= 5) badge = `<span class="badge" style="background:var(--warning)">+${m}m</span>`;
        else badge = `<span class="badge" style="background:var(--danger)">+${m}m</span>`;
      }
      const time = (d.planned_time||'').slice(11,16);
      c.innerHTML += `<div class="result-card">
        <div class="name">${d.line_name} → ${d.direction} ${badge}</div>
        <div class="meta">${time} · Platform ${d.platform||'?'}</div>
      </div>`;
    });
  } catch(e) { console.warn('Departures error:', e); }
}

// ══════════════════════════════════════
//  OPERATOR
// ══════════════════════════════════════
function setOp(op, el) {
  OP = op;
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');

  if (name === 'live') { fetchRadar(); startTimer(); }
  else { stopTimer(); }
}

function setStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = type;
}

// ══════════════════════════════════════
//  LIVE RADAR
// ══════════════════════════════════════
async function fetchRadar() {
  const zoom = map.getZoom();
  const info = document.getElementById('live-info');

  if (zoom < 7) {
    info.textContent = '🔍 Zoom in to see live trains (zoom 7+)';
    info.style.background = '#fef5e3'; info.style.color = '#e67e22';
    return;
  }

  info.textContent = '⏳ Loading trains...';
  info.style.background = '#e3ecfa'; info.style.color = 'var(--primary)';

  const b = map.getBounds();
  try {
    const res = await fetch(
      `${API}/radar?north=${b.getNorth()}&south=${b.getSouth()}&east=${b.getEast()}&west=${b.getWest()}`
    );
    const trains = await res.json();
    renderTrains(trains);
  } catch(e) {
    info.textContent = '❌ Radar error: ' + e.message;
    info.style.background = '#fde8e8'; info.style.color = 'var(--danger)';
  }
}

function renderTrains(trains) {
  layers.trains.clearLayers();
  const info = document.getElementById('live-info');
  const container = document.getElementById('live-results');

  if (!trains.length) {
    info.textContent = 'No trains in this area. Try panning to Germany.';
    info.style.background = '#fef5e3'; info.style.color = '#e67e22';
    container.innerHTML = '';
    return;
  }

  info.textContent = `🟢 ${trains.length} trains visible · auto-refreshing`;
  info.style.background = '#e8f8e8'; info.style.color = 'var(--success)';

  container.innerHTML = '';
  const iconSz = map.getZoom() >= 10 ? 22 : 16;

  trains.forEach(t => {
    const marker = L.marker([t.coords.latitude, t.coords.longitude], {icon: trainIcon(iconSz)})
      .bindPopup(`
        <b>${t.line_name}</b><br>
        → ${t.direction}<br>
        ${t.prev_station ? t.prev_station + ' → ' + t.next_station : ''}
      `).addTo(layers.trains);

    container.innerHTML += `
      <div class="result-card" onclick="map.setView([${t.coords.latitude},${t.coords.longitude}],12)">
        <span class="badge" style="background:#ff6b35">${t.line_name}</span>
        <span class="name">${t.direction || 'Unknown'}</span>
        <div class="meta">${t.prev_station || ''} ${t.prev_station ? '→' : ''} ${t.next_station || ''}</div>
      </div>`;
  });
}

// Auto-refresh
let moveTimer;
map.on('moveend', () => {
  if (currentTab !== 'live') return;
  clearTimeout(moveTimer);
  moveTimer = setTimeout(fetchRadar, 800);
});

function startTimer() {
  stopTimer();
  if (document.getElementById('auto-refresh').checked) {
    radarTimer = setInterval(fetchRadar, 60000);
  }
}
function stopTimer() {
  if (radarTimer) { clearInterval(radarTimer); radarTimer = null; }
}

document.getElementById('auto-refresh').onchange = () => {
  if (currentTab === 'live') startTimer();
};

// Initial fetch
setTimeout(fetchRadar, 500);
startTimer();

// ══════════════════════════════════════
//  ROUTE OPTIMIZER
// ══════════════════════════════════════
async function findRoute() {
  const fromInp = document.getElementById('route-from');
  const toInp = document.getElementById('route-to');
  const fromId = fromInp.dataset.sid;
  const toId = toInp.dataset.sid;

  if (!fromId || !toId) {
    setStatus('Please select stations from the dropdown suggestions', 'error');
    return;
  }

  setStatus('Computing route...', 'info');
  layers.route.clearLayers();

  const algo = document.getElementById('r-algo').value;
  const weight = document.getElementById('r-weight').value;

  try {
    const res = await fetch(
      `${API}/route/optimize?from_id=${enc(fromId)}&to_id=${enc(toId)}&algorithm=${algo}&weight=${weight}`
    );
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    const route = await res.json();
    renderRoute(route, 'route-results');
  } catch(e) {
    setStatus('Route error: ' + e.message, 'error');
  }
}

function renderRoute(route, containerId) {
  const c = document.getElementById(containerId);
  c.innerHTML = `<div class="route-stats">
    <div class="stat"><div class="val">${fmtDur(route.total_duration_minutes)}</div><div class="lbl">Duration</div></div>
    <div class="stat"><div class="val">${route.total_distance_km.toFixed(0)}</div><div class="lbl">km</div></div>
    <div class="stat"><div class="val">${route.num_stops}</div><div class="lbl">Stops</div></div>
  </div>`;

  const latlngs = [];
  route.segments.forEach((seg, i) => {
    latlngs.push([seg.from_station.coords.latitude, seg.from_station.coords.longitude]);
    if (i === route.segments.length - 1)
      latlngs.push([seg.to_station.coords.latitude, seg.to_station.coords.longitude]);

    L.circleMarker([seg.from_station.coords.latitude, seg.from_station.coords.longitude],
      {radius:6,fillColor:'var(--primary)',color:'#fff',weight:2,fillOpacity:1})
      .bindPopup(`<b>${seg.from_station.name}</b>`).addTo(layers.route);

    c.innerHTML += `<div class="result-card">
      <div class="name">${seg.from_station.name} → ${seg.to_station.name}</div>
      <div class="meta">${seg.distance_km} km · ${fmtDur(seg.duration_minutes)}</div>
    </div>`;
  });

  const last = route.segments[route.segments.length-1].to_station;
  L.circleMarker([last.coords.latitude, last.coords.longitude],
    {radius:8,fillColor:'var(--danger)',color:'#fff',weight:2,fillOpacity:1})
    .bindPopup(`<b>${last.name}</b> 🏁`).addTo(layers.route);

  L.polyline(latlngs,{color:'#1a73e8',weight:4,opacity:0.8,dashArray:'8,8'}).addTo(layers.route);
  map.fitBounds(latlngs,{padding:[50,400]});
  document.getElementById('status').className = '';
}

// ══════════════════════════════════════
//  PARETO
// ══════════════════════════════════════
async function findPareto() {
  const fromId = document.getElementById('pareto-from').dataset.sid;
  const toId = document.getElementById('pareto-to').dataset.sid;
  if (!fromId || !toId) { setStatus('Select stations from suggestions','error'); return; }

  setStatus('Computing Pareto routes...','info');
  layers.route.clearLayers();

  try {
    const res = await fetch(`${API}/route/pareto?from_id=${enc(fromId)}&to_id=${enc(toId)}`);
    if (!res.ok) throw new Error((await res.json()).detail);
    const data = await res.json();
    const c = document.getElementById('pareto-results');
    c.innerHTML = `<p style="font-size:0.85em;color:var(--muted);margin-bottom:8px">
      ${data.routes.length} Pareto solutions (${data.total_explored.toLocaleString()} explored)</p>`;

    const colors = ['#1a73e8','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
    const allLL = [];

    data.routes.forEach((pr, i) => {
      const o = pr.objectives;
      const col = colors[i % colors.length];
      c.innerHTML += `<div class="pareto-card" style="border-left-color:${col}">
        <div class="name">Route ${i+1}</div>
        <div class="pareto-objs">
          <span class="pareto-obj">⏱ <b>${fmtDur(o.duration_minutes)}</b></span>
          <span class="pareto-obj">🔄 <b>${o.transfers}</b></span>
          <span class="pareto-obj">📏 <b>${o.distance_km.toFixed(0)} km</b></span>
        </div>
      </div>`;

      const ll = [];
      pr.route.segments.forEach(s => {
        ll.push([s.from_station.coords.latitude, s.from_station.coords.longitude]);
        ll.push([s.to_station.coords.latitude, s.to_station.coords.longitude]);
      });
      if (ll.length) {
        L.polyline(ll,{color:col,weight:3,opacity:0.7}).addTo(layers.route);
        allLL.push(...ll);
      }
    });

    if (allLL.length) map.fitBounds(allLL,{padding:[50,400]});
    setStatus(`${data.routes.length} Pareto routes found`,'success');
  } catch(e) { setStatus('Error: '+e.message,'error'); }
}

// ══════════════════════════════════════
//  DELAY HEATMAP
// ══════════════════════════════════════
async function loadHeatmap() {
  const country = document.getElementById('delay-country').value.trim();
  setStatus('Loading delays...','info');
  layers.heat.clearLayers();

  try {
    const url = `${API}/delays/heatmap` + (country ? `?country=${enc(country)}` : '');
    const res = await fetch(url);
    const data = await res.json();
    const c = document.getElementById('delay-results');

    if (!data.stations || !data.stations.length) {
      c.innerHTML = '<p style="color:var(--muted)">No delay data. View departures for some stations first!</p>';
      setStatus('No delay data yet','info'); return;
    }

    c.innerHTML = `<p style="font-size:0.82em;color:var(--muted)">${data.stations.length} stations (last ${data.period_hours}h)</p>`;
    const bounds = [];
    data.stations.forEach(s => {
      const r = Math.min(20, Math.max(6, s.total_records));
      L.circleMarker([s.coords.latitude, s.coords.longitude],
        {radius:r,fillColor:s.color,color:'#fff',weight:2,fillOpacity:0.8})
        .bindPopup(`<b>${s.station_name}</b><br>Avg: ${(s.avg_delay_seconds/60).toFixed(1)}m<br>On-time: ${s.on_time_pct}%`)
        .addTo(layers.heat);
      bounds.push([s.coords.latitude, s.coords.longitude]);

      c.innerHTML += `<div class="result-card" style="border-left-color:${s.color}"
        onclick="map.setView([${s.coords.latitude},${s.coords.longitude}],12)">
        <div class="name">${s.station_name}</div>
        <div class="meta">Avg ${(s.avg_delay_seconds/60).toFixed(1)}m · ${s.on_time_pct}% on-time</div>
      </div>`;
    });
    if (bounds.length) map.fitBounds(bounds,{padding:[50,400]});
    setStatus(`${data.stations.length} stations on heatmap`,'success');
  } catch(e) { setStatus('Error: '+e.message,'error'); }
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function fmtDur(m){const h=Math.floor(m/60),mi=Math.round(m%60);return h>0?`${h}h ${mi}m`:`${mi}m`}
function enc(s){return encodeURIComponent(s)}

// PWA
if('serviceWorker' in navigator)
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
