<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚆 EU Rail Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    #map { width: 100%; height: 100vh; }

    /* ── sidebar ───────────────────────────────────── */
    #sidebar {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      width: 360px; max-height: calc(100vh - 20px);
      background: rgba(255,255,255,0.96); border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15); overflow-y: auto;
      padding: 20px;
    }
    h1 { font-size: 1.3em; margin-bottom: 12px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 0.85em;
      background: #e8e8e8; transition: all 0.2s;
    }
    .tab.active { background: #1a73e8; color: white; }

    .panel { display: none; }
    .panel.active { display: block; }

    label { font-size: 0.85em; font-weight: 600; color: #555;
            display: block; margin-bottom: 4px; margin-top: 12px; }
    input, select {
      width: 100%; padding: 10px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 0.95em; outline: none;
    }
    input:focus { border-color: #1a73e8; }
    button.primary {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: #1a73e8; color: white; font-weight: 700;
      font-size: 1em; cursor: pointer; margin-top: 16px;
      transition: background 0.2s;
    }
    button.primary:hover { background: #1557b0; }
    button.primary:disabled { background: #aaa; cursor: wait; }

    .results { margin-top: 16px; }
    .result-card {
      padding: 12px; background: #f5f7fa; border-radius: 8px;
      margin-bottom: 8px; font-size: 0.9em; cursor: pointer;
      border-left: 4px solid #1a73e8; transition: background 0.2s;
    }
    .result-card:hover { background: #e3ecfa; }
    .result-card .name { font-weight: 700; }
    .result-card .meta { color: #777; font-size: 0.85em; }

    .route-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-top: 12px;
    }
    .stat {
      text-align: center; background: #e3ecfa; padding: 10px;
      border-radius: 8px;
    }
    .stat .val { font-size: 1.3em; font-weight: 800; color: #1a73e8; }
    .stat .lbl { font-size: 0.75em; color: #666; }

    .train-badge {
      display: inline-block; background: #ff6b35; color: white;
      padding: 2px 8px; border-radius: 12px; font-size: 0.8em;
      font-weight: 700; margin-right: 6px;
    }

    #status {
      margin-top: 12px; padding: 8px; border-radius: 6px;
      font-size: 0.85em; display: none;
    }
    #status.info { display: block; background: #e3ecfa; color: #1a73e8; }
    #status.error { display: block; background: #fde8e8; color: #d32f2f; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <h1>🚆 EU Rail Tracker</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tracker')">🔴 Live</button>
    <button class="tab" onclick="switchTab('router')">🗺️ Route</button>
    <button class="tab" onclick="switchTab('search')">🔍 Search</button>
  </div>

  <!-- LIVE TRACKER -->
  <div id="panel-tracker" class="panel active">
    <label>Station (DB ID or name)</label>
    <input id="track-station" placeholder="e.g. 8011160 (Berlin Hbf)" />
    <button class="primary" onclick="trackLive()">Track Live Trains</button>
    <div id="track-results" class="results"></div>
  </div>

  <!-- ROUTE OPTIMIZER -->
  <div id="panel-router" class="panel">
    <label>From station ID</label>
    <input id="route-from" placeholder="Station ID (search tab to find)" />
    <label>To station ID</label>
    <input id="route-to" placeholder="Station ID" />

    <div style="display:flex; gap:8px; margin-top:12px;">
      <div style="flex:1">
        <label>Algorithm</label>
        <select id="route-algo">
          <option value="astar">A* (fast)</option>
          <option value="dijkstra">Dijkstra</option>
        </select>
      </div>
      <div style="flex:1">
        <label>Optimize for</label>
        <select id="route-weight">
          <option value="duration">⏱ Duration</option>
          <option value="distance">📏 Distance</option>
        </select>
      </div>
    </div>

    <button class="primary" onclick="findRoute()">Find Optimal Route</button>
    <div id="route-results" class="results"></div>
  </div>

  <!-- SEARCH -->
  <div id="panel-search" class="panel">
    <label>Search stations</label>
    <input id="search-input" placeholder="Berlin, Paris, Wien..."
           oninput="debounceSearch()" />
    <div id="search-results" class="results"></div>
  </div>

  <div id="status"></div>
</div>

<script>
const API = window.location.origin + '/api';

// ── Map Setup ──────────────────────────────────────────
const map = L.map('map').setView([50.1, 10.0], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM &copy; CARTO',
  maxZoom: 18,
}).addTo(map);

const trainIcon = L.divIcon({
  html: '<div style="font-size:22px;">🚆</div>',
  iconSize: [28, 28], iconAnchor: [14, 14], className: ''
});
const stationIcon = L.divIcon({
  html: '<div style="font-size:16px;">📍</div>',
  iconSize: [20, 20], iconAnchor: [10, 10], className: ''
});

let trainMarkers = L.layerGroup().addTo(map);
let routeLayer = L.layerGroup().addTo(map);
let stationMarkers = L.layerGroup().addTo(map);

// ── Tab Switching ──────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function setStatus(msg, type = 'info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}
function clearStatus() {
  document.getElementById('status').className = '';
  document.getElementById('status').style.display = 'none';
}

// ── Live Tracker ───────────────────────────────────────
async function trackLive() {
  const input = document.getElementById('track-station').value.trim();
  if (!input) return;

  setStatus('Fetching live train positions...', 'info');
  trainMarkers.clearLayers();

  try {
    // try as stop ID first, then search
    let stopId = input;
    if (!/^\d+$/.test(input)) {
      const res = await fetch(`${API}/stations/search?q=${encodeURIComponent(input)}&limit=1`);
      const stations = await res.json();
      if (stations.length === 0) { setStatus('Station not found', 'error'); return; }
      stopId = stations[0].db_id || stations[0].id;
    }

    const res = await fetch(`${API}/trains/live/${stopId}`);
    if (!res.ok) throw new Error(await res.text());
    const trains = await res.json();

    const container = document.getElementById('track-results');
    if (trains.length === 0) {
      container.innerHTML = '<p style="color:#888;margin-top:8px;">No active trains found. Try a major station like Berlin Hbf (8011160).</p>';
      setStatus('No trains in motion found', 'info');
      return;
    }

    container.innerHTML = '';
    const bounds = [];
    trains.forEach(t => {
      const marker = L.marker([t.coords.latitude, t.coords.longitude], {icon: trainIcon})
        .bindPopup(`
          <b>${t.line_name}</b> → ${t.direction}<br>
          ${t.prev_station} → ${t.next_station}<br>
          Progress: ${(t.progress * 100).toFixed(0)}%
          ${t.speed_kmh ? '<br>~' + t.speed_kmh + ' km/h' : ''}
        `)
        .addTo(trainMarkers);
      bounds.push([t.coords.latitude, t.coords.longitude]);

      container.innerHTML += `
        <div class="result-card" onclick="map.setView([${t.coords.latitude},${t.coords.longitude}],12)">
          <span class="train-badge">${t.line_name}</span>
          <span class="name">${t.direction}</span>
          <div class="meta">${t.prev_station} → ${t.next_station} (${(t.progress*100).toFixed(0)}%)</div>
        </div>`;
    });

    if (bounds.length) map.fitBounds(bounds, {padding: [50, 400]});
    setStatus(`Found ${trains.length} active trains`, 'info');
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

// ── Route Optimizer ────────────────────────────────────
async function findRoute() {
  const fromId = document.getElementById('route-from').value.trim();
  const toId = document.getElementById('route-to').value.trim();
  const algo = document.getElementById('route-algo').value;
  const weight = document.getElementById('route-weight').value;

  if (!fromId || !toId) return;
  setStatus('Computing optimal route...', 'info');
  routeLayer.clearLayers();

  try {
    const res = await fetch(
      `${API}/route/optimize?from_id=${encodeURIComponent(fromId)}` +
      `&to_id=${encodeURIComponent(toId)}&algorithm=${algo}&weight=${weight}`
    );
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    const route = await res.json();

    const container = document.getElementById('route-results');
    container.innerHTML = `
      <div class="route-stats">
        <div class="stat"><div class="val">${formatDuration(route.total_duration_minutes)}</div><div class="lbl">Duration</div></div>
        <div class="stat"><div class="val">${route.total_distance_km.toFixed(0)}</div><div class="lbl">km</div></div>
        <div class="stat"><div class="val">${route.num_stops}</div><div class="lbl">Stops</div></div>
      </div>`;

    const latlngs = [];
    route.segments.forEach((seg, i) => {
      const from = seg.from_station;
      const to = seg.to_station;
      latlngs.push([from.coords.latitude, from.coords.longitude]);
      if (i === route.segments.length - 1) {
        latlngs.push([to.coords.latitude, to.coords.longitude]);
      }

      // station markers
      L.circleMarker([from.coords.latitude, from.coords.longitude], {
        radius: 6, fillColor: '#1a73e8', color: 'white',
        weight: 2, fillOpacity: 1
      }).bindPopup(`<b>${from.name}</b><br>${from.country}`)
        .addTo(routeLayer);

      container.innerHTML += `
        <div class="result-card">
          <div class="name">${from.name} → ${to.name}</div>
          <div class="meta">${seg.distance_km} km · ${formatDuration(seg.duration_minutes)}</div>
        </div>`;
    });

    // end marker
    const last = route.segments[route.segments.length - 1].to_station;
    L.circleMarker([last.coords.latitude, last.coords.longitude], {
      radius: 8, fillColor: '#d32f2f', color: 'white',
      weight: 2, fillOpacity: 1
    }).bindPopup(`<b>${last.name}</b> (destination)`)
      .addTo(routeLayer);

    // polyline
    L.polyline(latlngs, {
      color: '#1a73e8', weight: 4, opacity: 0.8,
      dashArray: '8, 8'
    }).addTo(routeLayer);

    map.fitBounds(latlngs, {padding: [50, 400]});
    clearStatus();
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

function formatDuration(min) {
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ── Station Search ─────────────────────────────────────
let searchTimeout;
function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(searchStations, 300);
}

async function searchStations() {
  const q = document.getElementById('search-input').value.trim();
  if (q.length < 2) return;

  try {
    const res = await fetch(`${API}/stations/search?q=${encodeURIComponent(q)}&limit=15`);
    const stations = await res.json();
    const container = document.getElementById('search-results');
    container.innerHTML = '';
    stationMarkers.clearLayers();

    stations.forEach(s => {
      L.marker([s.coords.latitude, s.coords.longitude], {icon: stationIcon})
        .bindPopup(`<b>${s.name}</b><br>ID: ${s.id}<br>Country: ${s.country}`)
        .addTo(stationMarkers);

      container.innerHTML += `
        <div class="result-card" onclick="selectStation('${s.id}', ${s.coords.latitude}, ${s.coords.longitude})">
          <div class="name">${s.name}</div>
          <div class="meta">ID: ${s.id} ${s.db_id ? '· DB: '+s.db_id : ''} · ${s.country}</div>
        </div>`;
    });
  } catch (e) {
    console.error(e);
  }
}

function selectStation(id, lat, lon) {
  map.setView([lat, lon], 10);
  navigator.clipboard?.writeText(id);
  setStatus(`Station ID "${id}" copied — paste into Route or Live panels`, 'info');
}
</script>
</body>
</html>
