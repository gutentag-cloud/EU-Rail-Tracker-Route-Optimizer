<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#1a73e8"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>🚆 EU Rail Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{--p:#1a73e8;--r:#d32f2f;--g:#2ecc71;--w:#f39c12;--bg:rgba(255,255,255,.97);--card:#f5f7fa;--m:#888}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif}
    #map{width:100%;height:100vh}
    #sidebar{position:absolute;top:10px;left:10px;z-index:1000;width:390px;max-height:calc(100vh - 20px);background:var(--bg);border-radius:14px;box-shadow:0 4px 30px rgba(0,0,0,.12);overflow-y:auto;padding:18px}
    @media(max-width:500px){#sidebar{width:calc(100vw - 20px);max-height:50vh;top:auto;bottom:10px}}
    h1{font-size:1.3em;margin-bottom:4px}.sub{font-size:.78em;color:var(--m);margin-bottom:10px}
    .tabs{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
    .tab{flex:1;min-width:50px;padding:7px 3px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.75em;background:#e8e8e8;transition:all .2s;white-space:nowrap}
    .tab.active{background:var(--p);color:#fff}
    .panel{display:none}.panel.active{display:block}
    label{font-size:.82em;font-weight:600;color:#555;display:block;margin-bottom:4px;margin-top:10px}
    input,select{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:.92em;outline:none}
    input:focus{border-color:var(--p)}
    .row{display:flex;gap:8px}.row>*{flex:1}
    button.primary{width:100%;padding:11px;border:none;border-radius:8px;background:var(--p);color:#fff;font-weight:700;font-size:.95em;cursor:pointer;margin-top:12px}
    button.primary:hover{background:#1557b0}
    .results{margin-top:12px}
    .result-card{padding:10px 12px;background:var(--card);border-radius:8px;margin-bottom:6px;font-size:.88em;cursor:pointer;border-left:4px solid var(--p);transition:background .2s}
    .result-card:hover{background:#e3ecfa}
    .result-card .name{font-weight:700}.result-card .meta{color:var(--m);font-size:.82em}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.78em;font-weight:700;margin-right:4px;color:#fff}
    .live-info{border-radius:8px;padding:10px;font-size:.85em;margin-bottom:10px;text-align:center;font-weight:600}
    .toggle-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:.85em}
    .toggle-row input[type=checkbox]{width:auto}
    .ac-wrap{position:relative}
    .ac-drop{position:absolute;top:100%;left:0;right:0;z-index:2000;background:#fff;border:1px solid #ddd;border-radius:0 0 8px 8px;max-height:260px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.15)}
    .ac-drop:empty{display:none}
    .ac-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
    .ac-item:hover{background:#e3ecfa}
    .ac-name{font-weight:600;font-size:.9em}.ac-meta{font-size:.78em;color:var(--m)}
    .op-row{display:flex;gap:4px;margin-top:6px}
    .op-btn{flex:1;padding:5px;border:2px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-weight:600;font-size:.75em;text-align:center;transition:all .2s}
    .op-btn.active{border-color:var(--p);background:#e3ecfa}
    .op-status{font-size:.65em;display:block;margin-top:1px}
    #status{margin-top:10px;padding:8px;border-radius:6px;font-size:.82em;display:none}
    #status.info{display:block;background:#e3ecfa;color:var(--p)}
    #status.error{display:block;background:#fde8e8;color:var(--r)}
    #status.success{display:block;background:#e8f8e8;color:var(--g)}
    .j-card{padding:12px;background:var(--card);border-radius:10px;margin-bottom:8px;border-left:4px solid var(--p);cursor:pointer}
    .j-card:hover{background:#e3ecfa}
    .j-leg{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.85em;flex-wrap:wrap}
    .leg-line{background:#ff6b35;color:#fff;padding:2px 8px;border-radius:8px;font-weight:700;font-size:.8em;white-space:nowrap}
    .leg-walk{background:#aaa;color:#fff;padding:2px 8px;border-radius:8px;font-size:.75em}
    .leg-time{font-weight:700;font-size:.85em}
    .leg-delay{color:var(--r);font-size:.75em;font-weight:700}
    .j-summary{display:flex;gap:12px;margin-bottom:6px;font-size:.82em;color:var(--m)}
    .j-summary b{color:#333}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
    .stat{text-align:center;background:#e3ecfa;padding:8px;border-radius:8px}
    .stat .val{font-size:1.2em;font-weight:800;color:var(--p)}.stat .lbl{font-size:.72em;color:#666}
  </style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <h1>🚆 EU Rail Tracker</h1>
  <div class="sub">Live trains · Timetable routing · Delay analytics</div>

  <label>Operator <span style="font-weight:400;color:var(--m)">(for search & journeys)</span></label>
  <div class="op-row">
    <div class="op-btn active" onclick="setOp('db',this)">🇩🇪 DB<span class="op-status" style="color:var(--g)">✅</span></div>
    <div class="op-btn" onclick="setOp('sbb',this)">🇨🇭 SBB<span class="op-status" style="color:var(--g)">✅</span></div>
    <div class="op-btn" onclick="setOp('oebb',this)">🇦🇹 ÖBB<span class="op-status" style="color:var(--w)">⚠️</span></div>
    <div class="op-btn" onclick="setOp('sncf',this)">🇫🇷 SNCF<span class="op-status" style="color:var(--w)">⚠️</span></div>
  </div>

  <div class="tabs" style="margin-top:10px">
    <button class="tab active" onclick="switchTab('live')">🔴 Live Map</button>
    <button class="tab" onclick="switchTab('route')">🚄 Journeys</button>
    <button class="tab" onclick="switchTab('graph')">🧮 Graph</button>
    <button class="tab" onclick="switchTab('delays')">📊 Delays</button>
    <button class="tab" onclick="switchTab('explore')">🔍 Explore</button>
  </div>

  <!-- LIVE -->
  <div id="panel-live" class="panel active">
    <div class="live-info" id="live-info" style="background:#e3ecfa;color:var(--p)">📍 Zoom into Germany to see live trains</div>
    <div class="toggle-row">
      <input type="checkbox" id="auto-refresh" checked/>
      <label for="auto-refresh" style="margin:0">Auto-refresh 60s</label>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="show-tracks"/>
      <label for="show-tracks" style="margin:0">Show rail tracks (OSM)</label>
    </div>
    <button class="primary" onclick="fetchRadar()">🔄 Refresh Now</button>
    <div id="live-results" class="results"></div>
  </div>

  <!-- JOURNEYS -->
  <div id="panel-route" class="panel">
    <p style="font-size:.82em;color:var(--m);margin-bottom:4px">🚄 Real timetable connections</p>
    <label>From</label>
    <div class="ac-wrap"><input id="j-from" placeholder="Type station name..." autocomplete="off"/><div class="ac-drop" id="j-from-drop"></div></div>
    <label>To</label>
    <div class="ac-wrap"><input id="j-to" placeholder="Type station name..." autocomplete="off"/><div class="ac-drop" id="j-to-drop"></div></div>
    <button class="primary" onclick="searchJourneys()">🔍 Search Connections</button>
    <div id="journey-results" class="results"></div>
  </div>

  <!-- GRAPH -->
  <div id="panel-graph" class="panel">
    <p style="font-size:.82em;color:var(--m);margin-bottom:4px">🧮 Graph algorithms on station network (estimated times)</p>
    <label>From</label>
    <div class="ac-wrap"><input id="g-from" placeholder="Type station name..." autocomplete="off"/><div class="ac-drop" id="g-from-drop"></div></div>
    <label>To</label>
    <div class="ac-wrap"><input id="g-to" placeholder="Type station name..." autocomplete="off"/><div class="ac-drop" id="g-to-drop"></div></div>
    <div class="row">
      <div><label>Algorithm</label><select id="g-algo"><option value="astar">A*</option><option value="dijkstra">Dijkstra</option></select></div>
      <div><label>Weight</label><select id="g-weight"><option value="duration">⏱ Time</option><option value="distance">📏 Dist</option></select></div>
    </div>
    <button class="primary" onclick="findGraphRoute()">Compute Route</button>
    <div id="graph-results" class="results"></div>
  </div>

  <!-- DELAYS -->
  <div id="panel-delays" class="panel">
    <label>Country (optional)</label>
    <input id="delay-country" placeholder="DE, AT, CH, FR..."/>
    <button class="primary" onclick="loadHeatmap()">Load Delay Heatmap</button>
    <p style="font-size:.78em;color:var(--m);margin-top:8px">💡 Explore station departures first to collect delay data.</p>
    <div id="delay-results" class="results"></div>
  </div>

  <!-- EXPLORE -->
  <div id="panel-explore" class="panel">
    <label>Search stations</label>
    <div class="ac-wrap"><input id="ex-input" placeholder="Berlin, Milano, Wien..." autocomplete="off"/><div class="ac-drop" id="ex-input-drop"></div></div>
    <div id="explore-results" class="results"></div>
  </div>

  <div id="status"></div>
</div>

<script>
const API=location.origin+'/api';
let OP='db',currentTab='live',radarTimer=null;
const FL={DE:'🇩🇪',AT:'🇦🇹',CH:'🇨🇭',FR:'🇫🇷',IT:'🇮🇹',NL:'🇳🇱',BE:'🇧🇪',ES:'🇪🇸',CZ:'🇨🇿',PL:'🇵🇱',GB:'🇬🇧',SE:'🇸🇪',DK:'🇩🇰',HU:'🇭🇺',HR:'🇭🇷',SI:'🇸🇮',SK:'🇸🇰',RO:'🇷🇴',LU:'🇱🇺',PT:'🇵🇹',NO:'🇳🇴',FI:'🇫🇮'};

const map=L.map('map').setView([51.0,10.4],7); // Start zoomed into Germany
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',maxZoom:18}).addTo(map);
const LT=L.layerGroup().addTo(map),LR=L.layerGroup().addTo(map),LS=L.layerGroup().addTo(map),LH=L.layerGroup().addTo(map),LK=L.layerGroup().addTo(map);

function tIcon(sz){return L.divIcon({html:`<div style="font-size:${sz}px;cursor:pointer;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))">🚆</div>`,iconSize:[sz+6,sz+6],iconAnchor:[(sz+6)/2,(sz+6)/2],className:''})}

// ═══ AUTOCOMPLETE ═══
function setupAC(iid,did,onSel){
  const inp=document.getElementById(iid),drop=document.getElementById(did);let t;
  inp.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(async()=>{
    const q=inp.value.trim();if(q.length<2){drop.innerHTML='';return}
    try{const r=await fetch(`${API}/stations/search?q=${enc(q)}&limit=8&operator=${OP}`);
    const list=await r.json();drop.innerHTML='';
    if(!list.length){drop.innerHTML='<div class="ac-item"><span class="ac-name" style="color:var(--m)">No results</span></div>';return}
    list.forEach(s=>{const el=document.createElement('div');el.className='ac-item';
    el.innerHTML=`<span class="ac-name">${FL[s.country]||'🏳️'} ${s.name}</span><span class="ac-meta">${s.country||''} · ${s.db_id||s.id}</span>`;
    el.onclick=()=>{inp.value=s.name;inp.dataset.sid=s.id;inp.dataset.dbid=s.db_id||s.id;inp.dataset.lat=s.coords.latitude;inp.dataset.lon=s.coords.longitude;drop.innerHTML='';if(onSel)onSel(s)};
    drop.appendChild(el)})
    }catch(e){console.warn('AC:',e)}},250)});
  document.addEventListener('click',e=>{if(!inp.contains(e.target)&&!drop.contains(e.target))drop.innerHTML=''});
}
setupAC('j-from','j-from-drop');setupAC('j-to','j-to-drop');
setupAC('g-from','g-from-drop');setupAC('g-to','g-to-drop');
setupAC('ex-input','ex-input-drop',s=>{
  LS.clearLayers();
  L.circleMarker([s.coords.latitude,s.coords.longitude],{radius:8,fillColor:'#1a73e8',color:'#fff',weight:2,fillOpacity:1}).bindPopup(`<b>${s.name}</b><br>ID: ${s.id}<br>DB: ${s.db_id||'—'}`).addTo(LS);
  map.setView([s.coords.latitude,s.coords.longitude],10);
  loadDeps(s.db_id||s.id,s.name);
});

async function loadDeps(sid,name){
  try{const r=await fetch(`${API}/departures/${sid}?operator=${OP}&duration=60`);if(!r.ok)return;
  const deps=await r.json();const c=document.getElementById('explore-results');
  c.innerHTML=`<p style="font-size:.85em;font-weight:600;margin-bottom:8px">📋 ${name} — ${deps.length} departures</p>`;
  if(!deps.length){c.innerHTML+='<p style="color:var(--m)">No departures found</p>';return}
  deps.slice(0,15).forEach(d=>{const dl=d.delay_seconds;let b='';
  if(dl!=null){const m=Math.round(dl/60);b=m<=0?'<span class="badge" style="background:var(--g)">on time</span>':m<=5?`<span class="badge" style="background:var(--w)">+${m}m</span>`:`<span class="badge" style="background:var(--r)">+${m}m</span>`}
  c.innerHTML+=`<div class="result-card"><div class="name">${d.line_name} → ${d.direction} ${b}</div><div class="meta">${ft(d.planned_time)} · Pl. ${d.platform||'?'}</div></div>`})}catch(e){}}

// ═══ UTILS ═══
function setOp(o,el){OP=o;document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active')}
function switchTab(n){currentTab=n;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));event.target.classList.add('active');document.getElementById('panel-'+n).classList.add('active');if(n==='live'){fetchRadar();startTimer()}else{stopTimer()}}
function setStatus(m,t='info'){const e=document.getElementById('status');e.textContent=m;e.className=t}
function fd(m){const h=Math.floor(m/60),mi=Math.round(m%60);return h>0?`${h}h${mi}m`:`${mi}m`}
function ft(s){if(!s)return'?';return s.slice(11,16)||'?'}
function enc(s){return encodeURIComponent(s)}

// ═══ LIVE RADAR ═══
let lastTrackB=null,fetchingRadar=false;

async function fetchRadar(){
  if(fetchingRadar)return;
  const zoom=map.getZoom(),info=document.getElementById('live-info');
  if(zoom<7){info.textContent='🔍 Zoom in to see live trains (zoom 7+ required)';info.style.background='#fef5e3';info.style.color='#e67e22';return}

  fetchingRadar=true;
  info.textContent='⏳ Fetching live trains...';info.style.background='#e3ecfa';info.style.color='var(--p)';

  const b=map.getBounds();
  try{
    const r=await fetch(`${API}/radar?north=${b.getNorth()}&south=${b.getSouth()}&east=${b.getEast()}&west=${b.getWest()}`);
    const data=await r.json();
    renderTrains(data.trains||[],data.source,data.message);
  }catch(e){info.textContent='❌ '+e.message;info.style.background='#fde8e8';info.style.color='var(--r)'}
  fetchingRadar=false;

  if(document.getElementById('show-tracks').checked)loadTracks();
}

function renderTrains(trains,source,msg){
  LT.clearLayers();const info=document.getElementById('live-info'),c=document.getElementById('live-results');
  if(!trains.length){
    info.innerHTML='⚠️ No trains found in this area.<br><span style="font-size:.8em;font-weight:400">Best coverage: zoom into Germany 🇩🇪</span>';
    info.style.background='#fef5e3';info.style.color='#e67e22';c.innerHTML='';return}

  const src=source==='radar'?'DB Radar API':'Station interpolation';
  info.innerHTML=`🟢 <b>${trains.length}</b> trains · ${src}`;
  info.style.background='#e8f8e8';info.style.color='var(--g)';
  c.innerHTML='';

  const sz=map.getZoom()>=10?24:map.getZoom()>=8?20:16;
  trains.forEach((t,i)=>{
    const popup=`<div style="min-width:220px">
      <div style="font-size:1.1em;font-weight:700;margin-bottom:4px">${t.line_name||'?'}</div>
      <div style="color:#555;margin-bottom:6px">→ ${t.direction||'Unknown'}</div>
      ${t.prev_station?`<div style="font-size:.85em;margin-bottom:2px">📍 ${t.prev_station} → ${t.next_station}</div>`:''}
      ${t.speed_kmh?`<div style="font-size:.85em">🏃 ~${t.speed_kmh} km/h</div>`:''}
      ${t.progress!=null?`<div style="font-size:.85em">📊 ${(t.progress*100).toFixed(0)}% of segment</div>`:''}
      ${t.trip_id?`<div style="margin-top:8px"><a href="#" onclick="showTrip('${enc(t.trip_id)}');return false" style="color:var(--p);font-weight:600;text-decoration:none">📋 View all stops →</a></div>`:''}
    </div>`;
    L.marker([t.coords.latitude,t.coords.longitude],{icon:tIcon(sz)}).bindPopup(popup,{maxWidth:300}).addTo(LT);
    if(i<40)c.innerHTML+=`<div class="result-card" onclick="map.setView([${t.coords.latitude},${t.coords.longitude}],12)">
      <span class="badge" style="background:#ff6b35">${t.line_name||'?'}</span><span class="name">${t.direction||'—'}</span>
      ${t.prev_station?`<div class="meta">${t.prev_station} → ${t.next_station}</div>`:''}</div>`});
  if(trains.length>40)c.innerHTML+=`<p style="color:var(--m);font-size:.82em;text-align:center">+ ${trains.length-40} more on map</p>`}

async function showTrip(tripId){
  try{const r=await fetch(`${API}/trip/${tripId}?operator=db`);if(!r.ok){alert('Could not load trip');return}
  const trip=await r.json();
  let html=`<div style="max-height:350px;overflow-y:auto;min-width:250px">
    <div style="font-weight:700;font-size:1.1em;margin-bottom:6px">${trip.line_name} → ${trip.direction}</div>
    <table style="width:100%;font-size:.85em;border-collapse:collapse">`;
  trip.stopovers.forEach((so,i)=>{
    const a=ft(so.arrival),d=ft(so.departure),dl=so.delay_seconds;
    let dlS='';if(dl!=null&&dl>0)dlS=` <span style="color:var(--r);font-weight:700">+${Math.round(dl/60)}m</span>`;
    const bold=i===0||i===trip.stopovers.length-1?'font-weight:700':'';
    html+=`<tr style="${bold};border-bottom:1px solid #eee"><td style="padding:4px">${a!=='?'?a:d}</td><td style="padding:4px">${so.station.name}${dlS}</td></tr>`});
  html+='</table></div>';
  L.popup({maxWidth:320,maxHeight:420}).setLatLng(map.getCenter()).setContent(html).openOn(map)}catch(e){console.warn(e)}}

async function loadTracks(){
  const z=map.getZoom();if(z<9){LK.clearLayers();return}
  const b=map.getBounds(),k=`${b.getSouth().toFixed(2)},${b.getWest().toFixed(2)},${b.getNorth().toFixed(2)},${b.getEast().toFixed(2)}`;
  if(k===lastTrackB)return;lastTrackB=k;
  try{const r=await fetch(`${API}/geometry/network?min_lat=${b.getSouth()}&min_lon=${b.getWest()}&max_lat=${b.getNorth()}&max_lon=${b.getEast()}`);
  if(!r.ok)return;const d=await r.json();LK.clearLayers();
  d.lines.forEach(l=>{L.polyline(l.map(c=>[c[1],c[0]]),{color:'#555',weight:1.5,opacity:.35}).addTo(LK)})}catch(e){}}

document.getElementById('show-tracks').onchange=function(){if(this.checked)loadTracks();else{LK.clearLayers();lastTrackB=null}};

let moveT;
map.on('moveend',()=>{if(currentTab!=='live')return;clearTimeout(moveT);moveT=setTimeout(fetchRadar,800)});
function startTimer(){stopTimer();if(document.getElementById('auto-refresh').checked)radarTimer=setInterval(fetchRadar,60000)}
function stopTimer(){if(radarTimer){clearInterval(radarTimer);radarTimer=null}}
document.getElementById('auto-refresh').onchange=()=>{if(currentTab==='live')startTimer()};
setTimeout(fetchRadar,500);startTimer();

// ═══ JOURNEY SEARCH ═══
async function searchJourneys(){
  const fi=document.getElementById('j-from'),ti=document.getElementById('j-to');
  const fid=fi.dataset.dbid,tid=ti.dataset.dbid;
  if(!fid||!tid){setStatus('Select stations from the dropdown suggestions','error');return}
  setStatus('Searching connections...','info');LR.clearLayers();
  try{const r=await fetch(`${API}/journey/search?from_id=${enc(fid)}&to_id=${enc(tid)}&results=5&operator=${OP}`);
  if(!r.ok)throw new Error((await r.json()).detail||r.statusText);
  const data=await r.json();renderJourneys(data.journeys)}catch(e){setStatus('Error: '+e.message,'error')}}

function renderJourneys(journeys){
  const c=document.getElementById('journey-results');
  c.innerHTML=`<p style="font-size:.82em;color:var(--m);margin-bottom:8px">${journeys.length} connections found</p>`;
  const cols=['#1a73e8','#e74c3c','#2ecc71','#f39c12','#9b59b6'];
  journeys.forEach((j,idx)=>{
    const col=cols[idx%cols.length],depT=ft(j.departure),arrT=ft(j.arrival);
    let dur='';if(j.departure&&j.arrival){const ms=new Date(j.arrival)-new Date(j.departure);dur=fd(Math.round(ms/60000))}
    let legsH='',allLL=[];
    j.legs.forEach(leg=>{
      if(leg.walking){legsH+=`<div class="j-leg"><span class="leg-walk">🚶 Walk</span><span>${leg.origin} → ${leg.destination}</span></div>`;return}
      const dd=leg.dep_delay?` <span class="leg-delay">+${Math.round(leg.dep_delay/60)}m</span>`:'';
      legsH+=`<div class="j-leg"><span class="leg-time">${ft(leg.departure)}</span><span class="leg-line">${leg.line||leg.product||'?'}</span><span style="color:var(--m);font-size:.82em">${leg.origin} → ${leg.destination}</span><span class="leg-time">${ft(leg.arrival)}</span>${dd}</div>`;
      if(leg.origin_lat&&leg.dest_lat){
        const so=leg.stopovers||[];
        if(so.length>=2){const sl=so.filter(s=>s.lat&&s.lon).map(s=>[s.lat,s.lon]);if(sl.length>=2){L.polyline(sl,{color:col,weight:4,opacity:.8}).addTo(LR);allLL.push(...sl)}}
        else{const f=[leg.origin_lat,leg.origin_lon],t=[leg.dest_lat,leg.dest_lon];L.polyline([f,t],{color:col,weight:4,opacity:.8}).addTo(LR);allLL.push(f,t)}
        L.circleMarker([leg.origin_lat,leg.origin_lon],{radius:6,fillColor:col,color:'#fff',weight:2,fillOpacity:1}).bindPopup(`<b>${leg.origin}</b><br>${ft(leg.departure)} · Pl. ${leg.platform||'?'}`).addTo(LR);
        (leg.stopovers||[]).forEach(s=>{if(s.lat&&s.lon)L.circleMarker([s.lat,s.lon],{radius:3,fillColor:col,color:'#fff',weight:1,fillOpacity:.6}).bindPopup(`${s.name}<br>${ft(s.arrival)||ft(s.departure)||''}`).addTo(LR)})}});
    const ll=j.legs[j.legs.length-1];if(ll&&ll.dest_lat)L.circleMarker([ll.dest_lat,ll.dest_lon],{radius:8,fillColor:'#d32f2f',color:'#fff',weight:2,fillOpacity:1}).bindPopup(`<b>${ll.destination}</b> 🏁`).addTo(LR);
    c.innerHTML+=`<div class="j-card" style="border-left-color:${col}">
      <div class="j-summary"><span>🕐 <b>${depT} → ${arrT}</b></span><span>⏱ <b>${dur}</b></span><span>🔄 <b>${j.transfers}</b></span></div>${legsH}</div>`;
    if(allLL.length&&idx===0)map.fitBounds(allLL,{padding:[50,400]})});
  document.getElementById('status').className=''}

// ═══ GRAPH ═══
async function findGraphRoute(){
  const fid=document.getElementById('g-from').dataset.sid,tid=document.getElementById('g-to').dataset.sid;
  if(!fid||!tid){setStatus('Select stations from dropdown','error');return}
  setStatus('Computing...','info');LR.clearLayers();
  try{const r=await fetch(`${API}/route/optimize?from_id=${enc(fid)}&to_id=${enc(tid)}&algorithm=${document.getElementById('g-algo').value}&weight=${document.getElementById('g-weight').value}`);
  if(!r.ok)throw new Error((await r.json()).detail||r.statusText);
  const route=await r.json();const c=document.getElementById('graph-results');
  c.innerHTML=`<div class="stat-grid"><div class="stat"><div class="val">${fd(route.total_duration_minutes)}</div><div class="lbl">Est. time</div></div><div class="stat"><div class="val">${route.total_distance_km.toFixed(0)}</div><div class="lbl">km</div></div><div class="stat"><div class="val">${route.num_stops}</div><div class="lbl">stops</div></div></div><p style="font-size:.78em;color:var(--w);margin-bottom:8px">⚠️ Estimated. Use Journeys tab for real schedules.</p>`;
  const ll=[];route.segments.forEach((s,i)=>{ll.push([s.from_station.coords.latitude,s.from_station.coords.longitude]);if(i===route.segments.length-1)ll.push([s.to_station.coords.latitude,s.to_station.coords.longitude]);
  L.circleMarker([s.from_station.coords.latitude,s.from_station.coords.longitude],{radius:5,fillColor:'#1a73e8',color:'#fff',weight:2,fillOpacity:1}).addTo(LR);
  c.innerHTML+=`<div class="result-card"><div class="name">${s.from_station.name} → ${s.to_station.name}</div><div class="meta">${s.distance_km}km · ~${fd(s.duration_minutes)}</div></div>`});
  const last=route.segments[route.segments.length-1].to_station;
  L.circleMarker([last.coords.latitude,last.coords.longitude],{radius:8,fillColor:'#d32f2f',color:'#fff',weight:2,fillOpacity:1}).addTo(LR);
  L.polyline(ll,{color:'#1a73e8',weight:4,opacity:.8,dashArray:'8,8'}).addTo(LR);
  map.fitBounds(ll,{padding:[50,400]});document.getElementById('status').className=''}catch(e){setStatus(e.message,'error')}}

// ═══ DELAYS ═══
async function loadHeatmap(){
  const co=document.getElementById('delay-country').value.trim();setStatus('Loading...','info');LH.clearLayers();
  try{const r=await fetch(`${API}/delays/heatmap`+(co?`?country=${enc(co)}`:''));const d=await r.json();const c=document.getElementById('delay-results');
  if(!d.stations||!d.stations.length){c.innerHTML='<p style="color:var(--m)">No delay data. Explore station departures first!</p>';setStatus('No data','info');return}
  c.innerHTML=`<p style="font-size:.82em;color:var(--m)">${d.stations.length} stations</p>`;const bs=[];
  d.stations.forEach(s=>{const r=Math.min(20,Math.max(6,s.total_records));
  L.circleMarker([s.coords.latitude,s.coords.longitude],{radius:r,fillColor:s.color,color:'#fff',weight:2,fillOpacity:.8}).bindPopup(`<b>${s.station_name}</b><br>Avg: ${(s.avg_delay_seconds/60).toFixed(1)}m<br>On-time: ${s.on_time_pct}%`).addTo(LH);
  bs.push([s.coords.latitude,s.coords.longitude]);
  c.innerHTML+=`<div class="result-card" style="border-left-color:${s.color}" onclick="map.setView([${s.coords.latitude},${s.coords.longitude}],12)"><div class="name">${s.station_name}</div><div class="meta">Avg ${(s.avg_delay_seconds/60).toFixed(1)}m · ${s.on_time_pct}% on-time</div></div>`});
  if(bs.length)map.fitBounds(bs,{padding:[50,400]});setStatus(`${d.stations.length} stations`,'success')}catch(e){setStatus(e.message,'error')}}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
