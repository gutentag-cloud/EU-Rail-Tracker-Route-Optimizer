version: "3.9"

services:
  # ── PostgreSQL + PostGIS ───────────────────────────
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: rail
      POSTGRES_PASSWORD: rail
      POSTGRES_DB: railtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rail"]
      interval: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Application ───────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rail:rail@db:5432/railtracker
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend

volumes:
  pgdata:
  redisdata:
